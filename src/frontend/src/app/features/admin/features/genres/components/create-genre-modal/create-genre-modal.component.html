<div class="modal-backdrop" (click)="closeModal.emit()">
  <div class="modal-card modal-sm" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div>
        <h2 class="modal-title">{{ title() }}</h2>
        <p class="modal-subtitle">{{ subtitle() }}</p>
      </div>
      <button type="button" class="modal-close" aria-label="Close modal" (click)="closeModal.emit()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="modal-body">
        <div class="form-group">
          <label for="create-genre-name">Genre Name</label>
          <input
            id="create-genre-name"
            class="form-control"
            type="text"
            placeholder="Enter genre name"
            formControlName="name"
            [class.form-control--error]="isInvalid('name')" />
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" [disabled]="isSaving()" (click)="closeModal.emit()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="form.invalid || isSaving()">
          {{ isSaving() ? savingLabel() : submitLabel() }}
        </button>
      </div>
    </form>
  </div>
</div>
