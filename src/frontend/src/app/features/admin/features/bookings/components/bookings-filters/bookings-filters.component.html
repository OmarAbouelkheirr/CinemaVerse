<section class="filter-panel" aria-label="Bookings filters">
  <form [formGroup]="filterForm" class="filter-form">
    <div class="filter-groups">
      <div class="filter-group">
        <p class="group-label">STATUS &amp; DATE</p>
        <div class="group-row two-columns">
          <select class="form-control" formControlName="status" aria-label="Booking status" (change)="onFilterChange()">
            <option value="ALL">All Status</option>
            <option value="PENDING">Pending</option>
            <option value="CONFIRMED">Confirmed</option>
            <option value="CANCELLED">Cancelled</option>
            <option value="COMPLETED">Completed</option>
          </select>

          <input type="date" class="form-control" formControlName="dateFrom" aria-label="Date from" (change)="onFilterChange()" />
        </div>
      </div>

      <div class="filter-group">
        <p class="group-label">DATE &amp; AMOUNT</p>
        <div class="group-row two-columns">
          <input type="date" class="form-control" formControlName="dateTo" aria-label="Date to" (change)="onFilterChange()" />

          <div class="amount-range">
            <input type="number" class="form-control" formControlName="amountMin" placeholder="Min $" aria-label="Minimum amount" min="0" step="0.01" (input)="onFilterChange()" />
            <input type="number" class="form-control" formControlName="amountMax" placeholder="Max $" aria-label="Maximum amount" min="0" step="0.01" (input)="onFilterChange()" />
          </div>
        </div>
      </div>
    </div>

    <div class="panel-actions">
      <button type="button" class="btn-reset" (click)="onClear()">Clear Filters</button>
    </div>
  </form>
</section>
