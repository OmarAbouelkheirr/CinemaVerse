<section class="kpi-grid" aria-label="Movie KPIs">
    <app-kpi-card icon="movie" title="TOTAL MOVIES" [value]="totalMoviesDisplay()" />
    <app-kpi-card icon="play_circle" title="NOW SHOWING (ACTIVE)" [value]="nowShowingDisplay()" />
    <app-kpi-card icon="schedule" title="COMING SOON" [value]="comingSoonDisplay()" />
    <app-kpi-card icon="star" title="AVG RATING" [value]="averageRatingDisplay()" />
</section>
