<div class="movies-search-toolbar">
    <div class="movies-search-toolbar__top-bar">
        <div class="movies-search-toolbar__search">
            <label class="movies-search-toolbar__search-field" for="movies-search-toolbar-input">
                <span class="movies-search-toolbar__search-icon material-symbols-outlined" aria-hidden="true">
                    search
                </span>

                <input id="movies-search-toolbar-input" class="movies-search-toolbar__search-input" type="search"
                    placeholder="Search by movie name or ID..." aria-label="Search movies"
                    (input)="onSearchInput($event)" />
            </label>
        </div>

        <button class="movies-search-toolbar__toggle" type="button" (click)="toggleFilters()">
            <span class="material-symbols-outlined movies-search-toolbar__toggle-icon" aria-hidden="true">
                {{ isFiltersOpen() ? 'expand_less' : 'expand_more' }}
            </span>
            <span>Sort & Display</span>
        </button>

        <button class="movies-search-toolbar__button movies-search-toolbar__button--primary" type="button"
            id="add-movie-btn" (click)="onAddMovieClick()">
            <span class="material-symbols-outlined movies-search-toolbar__button-icon" aria-hidden="true">add</span>
            <span>Add Movie</span>
        </button>
    </div>

    @if (isFiltersOpen()) {
    <div class="movies-search-toolbar__filters-container">
        <select class="movies-search-toolbar__select form-control" aria-label="Filter by genre"
            (change)="onGenreChange($event)">
            <option value="all">All Genres</option>
            <option value="Action">Action</option>
            <option value="Adventure">Adventure</option>
            <option value="Animation">Animation</option>
            <option value="Comedy">Comedy</option>
            <option value="Drama">Drama</option>
            <option value="Family">Family</option>
            <option value="History">History</option>
            <option value="Horror">Horror</option>
            <option value="Musical">Musical</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Thriller">Thriller</option>
        </select>

        <select class="movies-search-toolbar__select form-control" aria-label="Filter by age rating"
            (change)="onAgeChange($event)">
            <option value="all">All Ages</option>
            <option value="G">G</option>
            <option value="PG">PG</option>
            <option value="PG-13">PG-13</option>
            <option value="R">R</option>
            <option value="NC-17">NC-17</option>
        </select>

        <select class="movies-search-toolbar__select form-control" aria-label="Filter by status"
            (change)="onStatusChange($event)">
            <option value="all">All Status</option>
            <option value="ACTIVE">Active</option>
            <option value="INACTIVE">Inactive</option>
            <option value="COMING_SOON">Coming Soon</option>
        </select>

        <select class="movies-search-toolbar__select form-control" aria-label="Filter by language"
            (change)="onLanguageChange($event)">
            <option value="all">All Languages</option>
            <option value="English">English</option>
            <option value="French">French</option>
            <option value="Arabic">Arabic</option>
            <option value="Spanish">Spanish</option>
            <option value="Latvian">Latvian</option>
        </select>

        <input type="date" class="movies-search-toolbar__date form-control" aria-label="Release date from"
            (change)="onDateFromChange($event)" />

        <input type="date" class="movies-search-toolbar__date form-control" aria-label="Release date to"
            (change)="onDateToChange($event)" />

        <select class="movies-search-toolbar__select form-control" aria-label="Sort field"
            (change)="onSortFieldChange($event)">
            <option value="release">Sort: Release</option>
            <option value="title">Sort: Title</option>
            <option value="rating">Sort: Rating</option>
            <option value="duration">Sort: Duration</option>
        </select>

        <select class="movies-search-toolbar__select form-control" aria-label="Sort direction"
            (change)="onSortDirChange($event)">
            <option value="desc">Descending</option>
            <option value="asc">Ascending</option>
        </select>
    </div>
    }
</div>
