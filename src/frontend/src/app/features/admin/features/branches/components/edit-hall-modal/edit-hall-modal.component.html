<div class="modal-backdrop" (click)="onBackdropClick()">
    <div class="modal-sm-md modal-card" (click)="$event.stopPropagation()">
        <!-- Header -->
        <div class="modal-header">
            <span class="edit-section-label">EDIT OPERATIONS</span>
            <h2 class="modal-title">Edit Hall Information</h2>
        </div>

        <!-- Body -->
        <div class="hall-modal-body">
            <!-- Form Section -->
            <div class="hall-form-section">
                <div class="form-group">
                    <label>HALL NUMBER</label>
                    <input #hallNumberInput class="form-control" type="number" [value]="hall().number" />
                </div>

                <div class="form-group">
                    <label>HALL TYPE</label>
                    <select #hallTypeSelect class="form-control" [value]="hall().type">
                        <option value="TwoD">TwoD</option>
                        <option value="ThreeD">ThreeD</option>
                        <option value="IMAX">IMAX</option>
                        <option value="VIP">VIP</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>CINEMA BRANCH</label>
                    <select #branchSelect class="form-control" [value]="hall().branchId">
                        @for (branch of branches(); track branch.id) {
                        <option [value]="branch.id">{{ branch.name }}</option>
                        }
                    </select>
                </div>

                <div class="form-group">
                    <label>HALL STATUS</label>
                    <select #hallStatusSelect class="form-control" [value]="hall().status === 'ACTIVE' ? 'Available' : 'Maintenance'">
                        <option value="Available">Available</option>
                        <option value="Maintenance">Maintenance</option>
                    </select>
                </div>
            </div>

            <!-- Map Preview Section (static) -->
            <div class="hall-map-section">
                <div class="map-visual">
                    <div class="map-road-v"></div>
                    <span class="material-symbols-outlined map-pin" aria-hidden="true">location_on</span>
                    <span class="map-label">Hall Location</span>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="modal-footer">
            <button class="btn btn-ghost btn-md" type="button" (click)="onCancel()">Cancel</button>
            <button class="btn btn-ghost btn-md" type="button" (click)="onDelete()">Delete Hall</button>
            <button class="btn btn-primary btn-md" type="button"
                (click)="onSave(hallNumberInput.value, hallTypeSelect.value, branchSelect.value, hallStatusSelect.value)">
                <span class="material-symbols-outlined" style="font-size: 16px;">save</span>
                Save Changes
            </button>
        </div>
    </div>
</div>
