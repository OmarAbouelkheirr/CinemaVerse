<div class="modal-backdrop" (click)="onBackdropClick()">
    <div class="modal-sm-md modal-card" (click)="$event.stopPropagation()">
        <!-- Header -->
        <div class="modal-header">
            <h2 class="modal-title">Add New Hall</h2>
            <p class="modal-subtitle">Configure a new screening hall for this branch.</p>
        </div>

        <!-- Body -->
        <div class="hall-modal-body">
            <!-- Form Section -->
            <div class="hall-form-section">
                <div class="form-group">
                    <label>HALL NUMBER</label>
                    <input #hallNumberInput class="form-control" type="number" placeholder="e.g., 1" />
                </div>

                <div class="form-group">
                    <label>HALL TYPE</label>
                    <select #hallTypeSelect class="form-control">
                        <option value="">Select type</option>
                        <option value="TwoD">TwoD</option>
                        <option value="ThreeD">ThreeD</option>
                        <option value="IMAX">IMAX</option>
                        <option value="VIP">VIP</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>CINEMA BRANCH</label>
                    <select #branchSelect class="form-control" [value]="selectedBranchId()">
                        <option value="">Select branch</option>
                        @for (branch of branches(); track branch.id) {
                        <option [value]="branch.id">{{ branch.name }}</option>
                        }
                    </select>
                </div>

                <div class="form-group">
                    <label>HALL STATUS</label>
                    <select #hallStatusSelect class="form-control">
                        <option value="Available">Available</option>
                        <option value="Maintenance">Maintenance</option>
                    </select>
                </div>
            </div>

            <!-- Map Preview Section -->
            <div class="hall-map-section">
                <div class="preview-placeholder">
                    <span>●</span>
                    <span>PREVIEW AVAILABLE AFTER SAVE</span>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="modal-footer">
            <button class="btn btn-ghost btn-md" type="button" (click)="onCancel()">Cancel</button>
            <button class="btn btn-primary btn-md" type="button"
                (click)="onSubmit(hallNumberInput.value, hallTypeSelect.value, branchSelect.value, hallStatusSelect.value)">
                <span class="material-symbols-outlined" style="font-size: 16px;">add</span>
                Add Hall
            </button>
        </div>
    </div>
</div>
