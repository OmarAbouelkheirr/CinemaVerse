<main class="auth-page">
  <section class="auth-card" aria-labelledby="reset-password-title">
    <div class="brand">
      <span class="brand__mark">CV</span>
      <p class="eyebrow">Account recovery</p>
      <h1 id="reset-password-title">Reset password</h1>
      <p class="subtitle">Set a new password to continue.</p>
    </div>

    @if (tokenError()) {
      <div class="alert" role="alert">
        <span class="material-symbols-outlined" aria-hidden="true">error</span>
        <span>{{ tokenError() }}</span>
      </div>
    }

    @if (error()) {
      <div class="alert" role="alert">
        <span class="material-symbols-outlined" aria-hidden="true">error</span>
        <span>{{ error() }}</span>
      </div>
    }

    @if (successMessage()) {
      <div class="success" role="status">
        <span class="material-symbols-outlined" aria-hidden="true">check_circle</span>
        <span>{{ successMessage() }} Redirecting to login...</span>
      </div>
    }

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <p class="section-label">Security update</p>

      <label class="field">
        <span>New password</span>
        <span class="input-shell">
          <span class="material-symbols-outlined" aria-hidden="true">lock</span>
          <input formControlName="newPassword" type="password" autocomplete="new-password" placeholder="Enter a strong password" />
        </span>
        @if (hasControlError('newPassword', 'required')) {
          <small>New password is required.</small>
        }
        @if (hasControlError('newPassword', 'pattern')) {
          <small>Password must include uppercase, lowercase, number, and symbol.</small>
        }
      </label>

      <label class="field">
        <span>Confirm password</span>
        <span class="input-shell">
          <span class="material-symbols-outlined" aria-hidden="true">lock</span>
          <input formControlName="confirmPassword" type="password" autocomplete="new-password" placeholder="Confirm your new password" />
        </span>
        @if (hasControlError('confirmPassword', 'required')) {
          <small>Confirm password is required.</small>
        }
        @if (hasPasswordMismatchError()) {
          <small>Passwords do not match.</small>
        }
      </label>

      <button class="primary-action" type="submit" [disabled]="loading() || form.invalid || !!tokenError()">
        <span>{{ loading() ? 'Resetting...' : 'Reset Password' }}</span>
      </button>

      <p class="switch-link"><a routerLink="/login">Back to sign in</a></p>
    </form>
  </section>
</main>
