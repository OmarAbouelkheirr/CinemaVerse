<div class="modal-backdrop" (click)="close.emit()">
  <div
    class="modal-card"
    role="dialog"
    aria-modal="true"
    [class.modal-sm]="size() === 'sm'"
    [class.modal-md]="size() === 'md'"
    [class.modal-lg]="size() === 'lg'"
    (click)="$event.stopPropagation()"
  >
    <ng-content />
  </div>
</div>
